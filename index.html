<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&C · Sistema Operativo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --ink: #0e0e1a; --ink2: #1a1a2e; --gold: #c9a84c; --gold2: #e8c96d; --gold-light: #fdf6e3;
  --cream: #f7f3ec; --cream2: #ede8dd; --white: #ffffff;
  --slate: #4a5568; --slate2: #718096; --slate3: #a0aec0;
  --red: #c53030; --red2: #fff5f5; --red3: #fed7d7;
  --green: #276749; --green2: #f0fff4; --green3: #c6f6d5;
  --blue: #2b6cb0; --blue2: #ebf8ff; --blue3: #bee3f8;
  --amber: #b7791f; --amber2: #fffbeb; --amber3: #fbd38d;
  --purple: #553c9a; --purple2: #faf5ff; --purple3: #d6bcfa;
  --border: #e2d9c8; --border2: #d1c7b5;
  --shadow: 0 2px 12px rgba(15,15,15,0.06); --shadow-md: 0 4px 20px rgba(15,15,15,0.10); --shadow-lg: 0 12px 48px rgba(15,15,15,0.15);
  --r: 10px; --r-sm: 6px; --r-lg: 16px;
  --sidebar-w: 220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:14px}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,select,textarea{font-family:'DM Sans',sans-serif}

/* ===== LOGIN ===== */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--ink2);
  background-image:radial-gradient(ellipse at 15% 50%,rgba(201,168,76,.18) 0%,transparent 55%),
  radial-gradient(ellipse at 85% 20%,rgba(201,168,76,.10) 0%,transparent 50%)}
.login-card{background:var(--white);border-radius:var(--r-lg);padding:48px 44px;width:400px;
  box-shadow:var(--shadow-lg);border-top:3px solid var(--gold);animation:fadeUp .45s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.login-brand{text-align:center;margin-bottom:36px}
.login-brand h1{font-family:'Playfair Display',serif;font-size:26px;color:var(--ink2);font-weight:700;letter-spacing:-.3px}
.login-brand span{color:var(--gold)}
.login-brand p{font-size:10px;color:var(--slate3);letter-spacing:3px;text-transform:uppercase;margin-top:5px}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--slate);letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px}
.field input,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:14px;color:var(--ink);background:var(--cream);transition:border-color .2s,background .2s;appearance:none}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold);background:var(--white)}
.btn-primary{width:100%;padding:13px;background:var(--ink2);color:var(--gold);border:none;border-radius:var(--r-sm);
  font-size:14px;font-weight:600;letter-spacing:.4px;transition:all .2s;margin-top:6px}
.btn-primary:hover{background:var(--gold);color:var(--ink2)}
.login-error{background:var(--red2);border:1px solid var(--red3);color:var(--red);border-radius:var(--r-sm);
  padding:10px 14px;font-size:13px;margin-top:14px;display:none}

/* ===== APP LAYOUT ===== */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--ink2);
  display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sidebar-brand{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand h2{font-family:'Playfair Display',serif;font-size:18px;color:var(--white);font-weight:700}
.sidebar-brand h2 span{color:var(--gold)}
.sidebar-brand p{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.sidebar-user{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--ink2);flex-shrink:0}
.user-info p{font-size:12px;font-weight:600;color:var(--white)}
.user-info span{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px}
.sidebar-nav{padding:16px 0;flex:1}
.nav-section{padding:6px 20px 4px;font-size:9px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:2px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:rgba(255,255,255,.55);
  font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,.05)}
.nav-item.active{color:var(--gold);background:rgba(201,168,76,.12)}
.nav-item .icon{font-size:15px;width:18px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
.btn-logout{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.35);font-size:12px;
  cursor:pointer;background:none;border:none;padding:0;transition:color .2s}
.btn-logout:hover{color:var(--red)}
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.topbar{padding:18px 28px;background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--ink2)}
.topbar-actions{display:flex;gap:10px;align-items:center}
.content{padding:24px 28px;flex:1}

/* ===== COMPONENTS ===== */
.btn{padding:9px 18px;border-radius:var(--r-sm);font-size:13px;font-weight:600;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-gold{background:var(--gold);color:var(--ink2)}.btn-gold:hover{background:var(--gold2)}
.btn-dark{background:var(--ink2);color:var(--white)}.btn-dark:hover{background:#2d2d45}
.btn-outline{background:transparent;color:var(--slate);border:1.5px solid var(--border)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:var(--red2);color:var(--red);border:1px solid var(--red3)}.btn-danger:hover{background:var(--red3)}
.btn-sm{padding:6px 12px;font-size:12px}

.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow)}
.card-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:700;color:var(--ink2)}
.card-body{padding:20px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

.stat-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;font-weight:600;color:var(--slate2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-value{font-size:26px;font-weight:700;color:var(--ink2);font-family:'Playfair Display',serif}
.stat-sub{font-size:12px;color:var(--slate2);margin-top:4px}
.stat-icon{font-size:28px;margin-bottom:8px}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.badge-green{background:var(--green3);color:var(--green)}
.badge-red{background:var(--red3);color:var(--red)}
.badge-amber{background:var(--amber3);color:var(--amber)}
.badge-blue{background:var(--blue3);color:var(--blue)}
.badge-purple{background:var(--purple3);color:var(--purple)}
.badge-gray{background:var(--cream2);color:var(--slate)}

table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--slate2);
   text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);background:var(--cream)}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--ink);vertical-align:middle}
tr:hover td{background:var(--gold-light)}
.table-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,10,20,.55);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:var(--r-lg);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:fadeUp .3s ease}
.modal-header{padding:22px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--ink2)}
.modal-close{background:none;border:none;font-size:20px;color:var(--slate2);cursor:pointer;line-height:1;padding:4px}
.modal-close:hover{color:var(--red)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.full{grid-template-columns:1fr;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{
  padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:13px;color:var(--ink);background:var(--cream);transition:border-color .2s;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold);background:var(--white)}
.form-group textarea{min-height:80px}

/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filter-select{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:13px;color:var(--slate);background:var(--white);appearance:none;cursor:pointer}
.search-input{padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:13px;color:var(--ink);background:var(--white);min-width:220px}
.search-input:focus{outline:none;border-color:var(--gold)}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:10px 20px;font-size:13px;font-weight:600;color:var(--slate2);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--gold)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--slate2)}
.empty .icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px}

/* KANBAN */
.kanban{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px}
.kanban-col{background:var(--cream2);border-radius:var(--r);padding:14px;min-width:200px;flex:1}
.kanban-col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--slate);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.kanban-card{background:var(--white);border-radius:var(--r-sm);padding:12px;margin-bottom:8px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .2s}
.kanban-card:hover{box-shadow:var(--shadow-md)}
.kanban-card h4{font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:4px}
.kanban-card p{font-size:11px;color:var(--slate2)}

/* AGING */
.aging-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.aging-card{border-radius:var(--r);padding:16px;text-align:center}
.aging-card.a0{background:var(--green2);border:1px solid var(--green3)}
.aging-card.a30{background:var(--amber2);border:1px solid var(--amber3)}
.aging-card.a60{background:#fff7ed;border:1px solid #fed7aa}
.aging-card.a90{background:var(--red2);border:1px solid var(--red3)}
.aging-card .amount{font-size:20px;font-weight:700;font-family:'Playfair Display',serif;margin-bottom:4px}
.aging-card .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--slate2);font-size:13px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ALERT */
.alert{padding:12px 16px;border-radius:var(--r-sm);font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.alert-success{background:var(--green2);color:var(--green);border:1px solid var(--green3)}
.alert-error{background:var(--red2);color:var(--red);border:1px solid var(--red3)}

/* HORA TRACKER */
.hora-badge{background:var(--blue2);color:var(--blue);border:1px solid var(--blue3);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
.hora-badge:hover{background:var(--blue3)}

/* PROGRESS BAR */
.progress{background:var(--cream2);border-radius:20px;height:6px;overflow:hidden}
.progress-bar{height:100%;border-radius:20px;background:var(--gold);transition:width .4s ease}
.progress-bar.danger{background:var(--red)}
.progress-bar.success{background:var(--green)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:.3s}
  .main{margin-left:0}
  .grid-4{grid-template-columns:1fr 1fr}
  .grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <h1>Aguirre <span>&</span> Ceballos</h1>
      <p>Sistema Operativo Interno</p>
    </div>
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="tu@aguirreceballos.com" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="off"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">Entrar al sistema →</button>
    <div class="login-error" id="login-error">Credenciales incorrectas. Verifica tu correo y contraseña.</div>
    <p style="text-align:center;margin-top:16px;font-size:11px;color:var(--slate3)">
      Acceso restringido · Aguirre & Ceballos © 2025
    </p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-brand">
      <h2>A<span>&</span>C</h2>
      <p>Sistema Operativo</p>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">HA</div>
      <div class="user-info">
        <p id="user-name">Héctor Aguirre</p>
        <span id="user-role">Socio Director</span>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">⬅ Cerrar sesión</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="page-content">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
    </div>
  </div>
</div>

<!-- MODAL GLOBAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Título</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-gold" id="modal-save" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPA_URL = 'https://ytclvwlrczhnlhyxqhhs.supabase.co';
const SUPA_KEY = 'sb_publishable_jT2nzx9qkUw8eZsPkX1v1Q_FkVGCw2Y';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let currentPage = 'dashboard';
let modalSaveCallback = null;

// ============================================================
// AUTH
// ============================================================
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!email || !pass) { errEl.style.display='block'; errEl.textContent='Completa todos los campos.'; return; }
  const { data, error } = await db.from('usuarios').select('*').eq('email', email).eq('password_hash', pass).eq('activo', true).single();
  if (error || !data) { errEl.style.display='block'; return; }
  currentUser = data;
  localStorage.setItem('ac_user', JSON.stringify(data));
  initApp();
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem('ac_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function checkSession() {
  const saved = localStorage.getItem('ac_user');
  if (saved) { currentUser = JSON.parse(saved); initApp(); }
}

// ============================================================
// APP INIT
// ============================================================
const NAV_ITEMS = [
  { id:'dashboard', label:'Dashboard', icon:'📊', roles:['socio_director','admin'] },
  { id:'clientes', label:'Clientes', icon:'🏢', roles:['socio_director','gerente_legal','gerente_contable','admin'] },
  { id:'proyectos', label:'Proyectos', icon:'📁', roles:['socio_director','gerente_legal','gerente_contable','admin','operativo'] },
  { id:'tareas', label:'Tareas', icon:'✅', roles:['socio_director','gerente_legal','gerente_contable','admin','operativo'] },
  { id:'finanzas', label:'Finanzas', icon:'💰', roles:['socio_director','admin'] },
  { id:'fiscal', label:'Fiscal / Impuestos', icon:'🧾', roles:['socio_director','admin'] },
  { id:'pipeline', label:'Pipeline', icon:'🎯', roles:['socio_director'] },
  { id:'marketing', label:'Marketing', icon:'📣', roles:['socio_director'] },
  { id:'talento', label:'Talento', icon:'👥', roles:['socio_director','admin'] },
  { id:'usuarios', label:'Usuarios', icon:'⚙️', roles:['socio_director'] },
];

function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const initials = currentUser.nombre.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name').textContent = currentUser.nombre;
  const roleLabels = {socio_director:'Socio Director',gerente_legal:'Gerente Legal',gerente_contable:'Gerente Contable',admin:'Administración',operativo:'Operativo'};
  document.getElementById('user-role').textContent = roleLabels[currentUser.rol] || currentUser.rol;
  buildNav();
  const startPage = currentUser.rol === 'operativo' ? 'tareas' : 'dashboard';
  navigate(startPage);
}

function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '<div class="nav-section">Módulos</div>';
  NAV_ITEMS.forEach(item => {
    if (!item.roles.includes(currentUser.rol)) return;
    const btn = document.createElement('button');
    btn.className = 'nav-item';
    btn.id = 'nav-' + item.id;
    btn.innerHTML = `<span class="icon">${item.icon}</span>${item.label}`;
    btn.onclick = () => navigate(item.id);
    nav.appendChild(btn);
  });
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + page);
  if (btn) btn.classList.add('active');
  const titles = {dashboard:'Dashboard Ejecutivo',clientes:'Clientes',proyectos:'Proyectos',tareas:'Tareas Operativas',finanzas:'Finanzas',fiscal:'Fiscal / Impuestos',pipeline:'Pipeline de Ventas',marketing:'Marketing & Contenido',talento:'Talento',usuarios:'Gestión de Usuarios'};
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';
  const content = document.getElementById('page-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
  const pages = {dashboard:pageDashboard,clientes:pageClientes,proyectos:pageProyectos,tareas:pageTareas,finanzas:pageFinanzas,fiscal:pageFiscal,pipeline:pagePipeline,marketing:pageMarketing,talento:pageTalento,usuarios:pageUsuarios};
  if (pages[page]) pages[page]();
}

// ============================================================
// HELPERS
// ============================================================
function fmt(n) { return n ? new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',minimumFractionDigits:0}).format(n) : '$0'; }
function fmtDate(d) { if (!d) return '—'; const dt = new Date(d+'T12:00:00'); return dt.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}); }
function today() { return new Date().toISOString().split('T')[0]; }
function daysUntil(d) { if (!d) return null; return Math.ceil((new Date(d+'T12:00:00') - new Date()) / 86400000); }

function badgeEstatus(e) {
  const map = {Activo:'green',Pausado:'amber',Cerrado:'gray','En curso':'blue','En revisión':'amber',Terminado:'green',Facturado:'purple',Cobrado:'green',Pendiente:'amber','Completada':'green',Cancelada:'gray',Emitida:'blue',Vencida:'red',Pagada:'green',Lead:'gray','Reunión':'blue',Propuesta:'amber',Negociación:'purple','Cerrado Ganado':'green','Cerrado Perdido':'red'};
  const c = map[e] || 'gray';
  return `<span class="badge badge-${c}">${e}</span>`;
}

function badgeRiesgo(r) {
  const map = {Bajo:'green',Medio:'amber',Alto:'red',Crítica:'red',Alta:'red',Media:'amber',Baja:'green'};
  return `<span class="badge badge-${map[r]||'gray'}">${r}</span>`;
}

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `alert alert-${type}`;
  t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;min-width:280px;box-shadow:var(--shadow-md);animation:fadeUp .3s ease';
  t.innerHTML = `${type==='success'?'✅':'❌'} ${msg}`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

function openModal(title, body, saveLabel, callback, hideSave=false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-save').textContent = saveLabel || 'Guardar';
  document.getElementById('modal-save').style.display = hideSave ? 'none' : 'inline-flex';
  modalSaveCallback = callback;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); modalSaveCallback = null; }
function saveModal() { if (modalSaveCallback) modalSaveCallback(); }

// Helper para filtros de mes
function mesActual() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function mesAnterior() {
  const d = new Date();
  d.setMonth(d.getMonth()-1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function mesLabel(ym) {
  if (!ym) return '';
  const [y,m] = ym.split('-');
  return new Date(y, m-1).toLocaleDateString('es-MX',{month:'long',year:'numeric'});
}
function enMes(fecha, ym) {
  if (!fecha||!ym) return false;
  return fecha.startsWith(ym);
}

async function pageDashboard() {
  const content = document.getElementById('page-content');
  const mes = mesActual(), mesAnt = mesAnterior();
  const [clientes, proyectos, tareas, cobrar, pagar, pipeline] = await Promise.all([
    db.from('clientes').select('*').eq('estatus','Activo'),
    db.from('proyectos').select('*,clientes(nombre_empresa)'),
    db.from('tareas').select('*').neq('estado','Completada').neq('estado','Cancelada'),
    db.from('cuentas_cobrar').select('*,clientes(nombre_empresa)'),
    db.from('cuentas_pagar').select('*'),
    db.from('pipeline').select('*').neq('etapa','Cerrado Ganado').neq('etapa','Cerrado Perdido'),
  ]);
  const cl = clientes.data||[], pr = proyectos.data||[], ta = tareas.data||[];
  const co = cobrar.data||[], pa = pagar.data||[], pip = pipeline.data||[];

  // KPIs generales
  const totalCobrar = co.filter(r=>r.estatus!=='Pagada'&&r.estatus!=='Cancelada').reduce((s,r)=>s+Number(r.monto||0),0);
  const proyRiesgo = pr.filter(p=>p.riesgo==='Alto');
  const tareasVencidas = ta.filter(t=>t.fecha_limite && daysUntil(t.fecha_limite)<0);
  const pipelineTotal = pip.reduce((s,r)=>s+Number(r.ticket_estimado||0)*(r.probabilidad||0)/100,0);
  const proyEnCurso = pr.filter(p=>p.estado==='En curso');
  const top5 = [...cl].sort((a,b)=>Number(b.honorarios_pactados||0)-Number(a.honorarios_pactados||0)).slice(0,5);
  const tareasCriticas = ta.filter(t=>t.prioridad==='Crítica'||t.prioridad==='Alta').sort((a,b)=>{
    const da=a.fecha_limite?daysUntil(a.fecha_limite):999, db2=b.fecha_limite?daysUntil(b.fecha_limite):999;
    return da-db2;
  }).slice(0,5);

  // Cierre mensual — mes actual
  const ingMes = co.filter(r=>r.estatus==='Pagada'&&enMes(r.fecha_emision,mes)).reduce((s,r)=>s+Number(r.monto||0)/1.16,0);
  const gastMes = pa.filter(r=>r.estatus==='Pagada'&&enMes(r.fecha_vencimiento,mes)).reduce((s,r)=>s+Number(r.monto||0),0);
  const ivaMes = co.filter(r=>r.estatus==='Pagada'&&enMes(r.fecha_emision,mes)).reduce((s,r)=>s+(Number(r.monto||0)-Number(r.monto||0)/1.16),0);
  const utilMes = ingMes - gastMes;

  // Cierre mensual — mes anterior
  const ingAnt = co.filter(r=>r.estatus==='Pagada'&&enMes(r.fecha_emision,mesAnt)).reduce((s,r)=>s+Number(r.monto||0)/1.16,0);
  const gastAnt = pa.filter(r=>r.estatus==='Pagada'&&enMes(r.fecha_vencimiento,mesAnt)).reduce((s,r)=>s+Number(r.monto||0),0);
  const utilAnt = ingAnt - gastAnt;
  const varUtil = utilAnt>0 ? Math.round((utilMes-utilAnt)/utilAnt*100) : 0;

  content.innerHTML = `
    <div class="grid-4" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-icon">🏢</div><div class="stat-label">Clientes Activos</div><div class="stat-value">${cl.length}</div></div>
      <div class="stat-card"><div class="stat-icon">📁</div><div class="stat-label">Proyectos en Curso</div><div class="stat-value">${proyEnCurso.length}</div></div>
      <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">Cobranza Pendiente</div><div class="stat-value" style="font-size:20px">${fmt(totalCobrar)}</div></div>
      <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-label">Pipeline Ponderado</div><div class="stat-value" style="font-size:20px">${fmt(pipelineTotal)}</div></div>
    </div>

    <!-- CIERRE MENSUAL -->
    <div class="card" style="margin-bottom:20px;border-left:4px solid var(--gold)">
      <div class="card-header">
        <span class="card-title">📅 Cierre Mensual — ${mesLabel(mes)}</span>
        <span style="font-size:12px;color:var(--slate2)">vs ${mesLabel(mesAnt)}</span>
      </div>
      <div class="card-body">
        <div class="grid-4">
          <div style="text-align:center;padding:12px">
            <div style="font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Ingresos netos</div>
            <div style="font-size:22px;font-weight:700;color:var(--green);font-family:'Playfair Display',serif">${fmt(ingMes)}</div>
            <div style="font-size:11px;color:var(--slate2);margin-top:3px">Ant: ${fmt(ingAnt)}</div>
          </div>
          <div style="text-align:center;padding:12px">
            <div style="font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Gastos</div>
            <div style="font-size:22px;font-weight:700;color:var(--red);font-family:'Playfair Display',serif">${fmt(gastMes)}</div>
            <div style="font-size:11px;color:var(--slate2);margin-top:3px">Ant: ${fmt(gastAnt)}</div>
          </div>
          <div style="text-align:center;padding:12px">
            <div style="font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Utilidad</div>
            <div style="font-size:22px;font-weight:700;color:${utilMes>=0?'var(--gold)':'var(--red)'};font-family:'Playfair Display',serif">${fmt(utilMes)}</div>
            <div style="font-size:11px;color:${varUtil>=0?'var(--green)':'var(--red)'};margin-top:3px;font-weight:600">${varUtil>=0?'▲':'▼'} ${Math.abs(varUtil)}% vs mes ant.</div>
          </div>
          <div style="text-align:center;padding:12px">
            <div style="font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">IVA trasladado</div>
            <div style="font-size:22px;font-weight:700;color:var(--amber);font-family:'Playfair Display',serif">${fmt(ivaMes)}</div>
            <div style="font-size:11px;color:var(--slate2);margin-top:3px">Pasivo SAT del mes</div>
          </div>
        </div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:20px">
      <div class="card">
        <div class="card-header"><span class="card-title">⚠️ Proyectos en Riesgo Alto (${proyRiesgo.length})</span></div>
        <div class="card-body" style="padding:0">
          ${proyRiesgo.length===0?'<div class="empty"><p>Sin proyectos en riesgo alto ✅</p></div>':
          `<table><thead><tr><th>Proyecto</th><th>Cliente</th><th>Estado</th><th>Fecha límite</th></tr></thead><tbody>
          ${proyRiesgo.slice(0,6).map(p=>`<tr>
            <td><strong>${p.nombre}</strong></td>
            <td>${p.clientes?.nombre_empresa||'—'}</td>
            <td>${badgeEstatus(p.estado)}</td>
            <td style="color:${p.fecha_limite&&daysUntil(p.fecha_limite)<0?'var(--red)':'inherit'}">${fmtDate(p.fecha_limite)}</td>
          </tr>`).join('')}</tbody></table>`}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">🔥 Tareas Críticas / Alta Prioridad</span></div>
        <div class="card-body" style="padding:0">
          ${tareasCriticas.length===0?'<div class="empty"><p>Sin tareas críticas pendientes ✅</p></div>':
          `<table><thead><tr><th>Tarea</th><th>Responsable</th><th>Días</th></tr></thead><tbody>
          ${tareasCriticas.map(t=>{const d=t.fecha_limite?daysUntil(t.fecha_limite):null;return`<tr>
            <td><strong>${t.titulo}</strong><br><span style="font-size:11px;color:var(--slate2)">${t.area||''}</span></td>
            <td>${t.responsable||'—'}</td>
            <td style="font-weight:700;color:${d===null?'inherit':d<0?'var(--red)':d<=3?'var(--amber)':'var(--green)'}">
              ${d===null?'—':d<0?`${Math.abs(d)}d venc.`:d===0?'Hoy':`${d}d`}
            </td>
          </tr>`}).join('')}</tbody></table>`}
        </div>
      </div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><span class="card-title">🏆 Top 5 Clientes por Honorarios</span></div>
        <div class="card-body" style="padding:0">
          ${top5.length===0?'<div class="empty"><p>Sin clientes registrados</p></div>':
          `<table><thead><tr><th>Cliente</th><th>Sector</th><th>Honorarios</th><th>Riesgo</th></tr></thead><tbody>
          ${top5.map(c=>`<tr>
            <td><strong>${c.nombre_empresa}</strong><br><span style="font-size:11px;color:var(--slate2)">${c.representante||''}</span></td>
            <td><span class="badge badge-blue">${c.sector||'—'}</span></td>
            <td><strong>${fmt(c.honorarios_pactados)}</strong></td>
            <td>${badgeRiesgo(c.nivel_riesgo||'Bajo')}</td>
          </tr>`).join('')}</tbody></table>`}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">⏰ Tareas Vencidas (${tareasVencidas.length})</span></div>
        <div class="card-body" style="padding:0">
          ${tareasVencidas.length===0?'<div class="empty"><p>Sin tareas vencidas ✅</p></div>':
          `<table><thead><tr><th>Tarea</th><th>Responsable</th><th>Vencida hace</th></tr></thead><tbody>
          ${tareasVencidas.slice(0,6).map(t=>`<tr>
            <td><strong>${t.titulo}</strong></td>
            <td>${t.responsable||'—'}</td>
            <td style="color:var(--red);font-weight:700">${Math.abs(daysUntil(t.fecha_limite))}d</td>
          </tr>`).join('')}</tbody></table>`}
        </div>
      </div>
    </div>`;
}

async function renderClientes(filtroEstatus='', filtroSector='', search='') {

  let query = db.from('clientes').select('*').order('nombre_empresa');
  if (filtroEstatus) query = query.eq('estatus', filtroEstatus);
  if (filtroSector) query = query.eq('sector', filtroSector);
  const { data } = await query;
  let cl = data||[];
  if (search) cl = cl.filter(c=>c.nombre_empresa.toLowerCase().includes(search.toLowerCase())||c.rfc?.toLowerCase().includes(search.toLowerCase())||c.representante?.toLowerCase().includes(search.toLowerCase()));

  const totalHonorarios = cl.reduce((s,c)=>s+Number(c.honorarios_pactados||0),0);
  const altoRiesgo = cl.filter(c=>c.nivel_riesgo==='Alto').length;

  content.innerHTML = `
    <div class="grid-4" style="margin-bottom:18px">
      <div class="stat-card"><div class="stat-label">Total clientes</div><div class="stat-value">${cl.length}</div></div>
      <div class="stat-card"><div class="stat-label">Honorarios totales</div><div class="stat-value" style="font-size:18px">${fmt(totalHonorarios)}</div></div>
      <div class="stat-card"><div class="stat-label">Alto riesgo</div><div class="stat-value" style="color:var(--red)">${altoRiesgo}</div></div>
      <div class="stat-card"><div class="stat-label">Activos</div><div class="stat-value" style="color:var(--green)">${cl.filter(c=>c.estatus==='Activo').length}</div></div>
    </div>
    <div class="filters">
      <input class="search-input" placeholder="🔍 Buscar cliente, RFC, representante..." value="${search}" oninput="renderClientes('${filtroEstatus}','${filtroSector}',this.value)">
      <select class="filter-select" onchange="renderClientes(this.value,'${filtroSector}','${search}')">
        <option value="">Todos los estatus</option>
        <option ${filtroEstatus==='Activo'?'selected':''}>Activo</option>
        <option ${filtroEstatus==='Pausado'?'selected':''}>Pausado</option>
        <option ${filtroEstatus==='Cerrado'?'selected':''}>Cerrado</option>
      </select>
      <select class="filter-select" onchange="renderClientes('${filtroEstatus}',this.value,'${search}')">
        <option value="">Todos los sectores</option>
        <option ${filtroSector==='IMMEX'?'selected':''}>IMMEX</option>
        <option ${filtroSector==='Comercio Exterior'?'selected':''}>Comercio Exterior</option>
        <option ${filtroSector==='Corporativo'?'selected':''}>Corporativo</option>
        <option ${filtroSector==='Contable'?'selected':''}>Contable</option>
        <option ${filtroSector==='Fiscal Estratégico'?'selected':''}>Fiscal Estratégico</option>
        <option ${filtroSector==='Litigio'?'selected':''}>Litigio</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Empresa</th><th>RFC</th><th>Email contacto</th><th>Sector</th><th>Tipo</th><th>Honorarios</th><th>Complejidad</th><th>Riesgo</th><th>Estatus</th><th></th></tr></thead>
        <tbody>
          ${cl.length===0?`<tr><td colspan="9"><div class="empty"><div class="icon">🏢</div><p>No hay clientes registrados</p></div></td></tr>`:''}
          ${cl.map(c=>`<tr>
            <td><strong>${c.nombre_empresa}</strong><br><span style="font-size:11px;color:var(--slate2)">${c.representante||''}</span></td>
            <td style="font-family:'DM Mono',monospace;font-size:12px">${c.rfc||'—'}</td>
            <td style="font-size:12px">${c.email_contacto?`<a href="mailto:${c.email_contacto}" style="color:var(--blue)">${c.email_contacto}</a>`:'—'}</td>
            <td><span class="badge badge-blue">${c.sector||'—'}</span></td>

function openClienteModal(id=null) {
  const isEdit = !!id;
  const loadAndOpen = async () => {
    let c = {};
    if (isEdit) { const {data} = await db.from('clientes').select('*').eq('id',id).single(); c = data||{}; }
    const body = `
      <div class="form-row"><div class="form-group"><label>Nombre empresa *</label><input id="f-nombre" value="${c.nombre_empresa||''}" placeholder="Empresa S.A. de C.V."/></div>
      <div class="form-group"><label>RFC</label><input id="f-rfc" value="${c.rfc||''}" placeholder="RFC123456XXX"/></div></div>
      <div class="form-row"><div class="form-group"><label>Representante</label><input id="f-rep" value="${c.representante||''}" /></div>
      <div class="form-group"><label>Sector</label><select id="f-sector"><option value="">— Seleccionar —</option>${['IMMEX','Comercio Exterior','Corporativo','Fiscal Estratégico','Contable','Litigio','Otro'].map(s=>`<option ${c.sector===s?'selected':''}>${s}</option>`).join('')}</select></div></div>
      <div class="form-row"><div class="form-group"><label>Tipo de cliente</label><select id="f-tipo"><option value="">— Seleccionar —</option>${['Iguala','Proyecto','Litigio','Recurrente mensual'].map(s=>`<option ${c.tipo_cliente===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="form-group"><label>Honorarios pactados (MXN)</label><input id="f-hon" type="number" value="${c.honorarios_pactados||''}" placeholder="0.00"/></div></div>
      <div class="form-row"><div class="form-group"><label>Margen estimado (%)</label><input id="f-margen" type="number" value="${c.margen_estimado||''}" placeholder="0"/></div>
      <div class="form-group"><label>Nivel de complejidad (1-5)</label><input id="f-comp" type="number" min="1" max="5" value="${c.nivel_complejidad||''}"/></div></div>
      <div class="form-row"><div class="form-group"><label>Nivel de riesgo</label><select id="f-riesgo"><option value="">— Seleccionar —</option>${['Bajo','Medio','Alto'].map(s=>`<option ${c.nivel_riesgo===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="form-group"><label>Estatus</label><select id="f-estatus"><option value="">— Seleccionar —</option>${['Activo','Pausado','Cerrado'].map(s=>`<option ${c.estatus===s?'selected':''}>${s}</option>`).join('')}</select></div></div>
      <div class="form-row"><div class="form-group"><label>Email de contacto (cobranza)</label><input id="f-email" type="email" value="${c.email_contacto||''}" placeholder="contacto@empresa.com"/></div>
      <div class="form-group"><label>Teléfono</label><input id="f-tel" value="${c.telefono||''}" placeholder="+52 81 0000 0000"/></div></div>
      <div class="form-row full"><div class="form-group"><label>Notas</label><textarea id="f-notas">${c.notas||''}</textarea></div></div>`;
    openModal(isEdit?'Editar Cliente':'Nuevo Cliente', body, 'Guardar', async()=>{
      const payload = {
        nombre_empresa: document.getElementById('f-nombre').value,
        rfc: document.getElementById('f-rfc').value,
        representante: document.getElementById('f-rep').value,
        sector: document.getElementById('f-sector').value,
        tipo_cliente: document.getElementById('f-tipo').value,
        honorarios_pactados: parseFloat(document.getElementById('f-hon').value)||null,
        margen_estimado: parseFloat(document.getElementById('f-margen').value)||null,
        nivel_complejidad: parseInt(document.getElementById('f-comp').value)||null,
        nivel_riesgo: document.getElementById('f-riesgo').value,
        estatus: document.getElementById('f-estatus').value||'Activo',
        email_contacto: document.getElementById('f-email').value,
        telefono: document.getElementById('f-tel').value,
        notas: document.getElementById('f-notas').value,
        updated_at: new Date().toISOString(),
      };
      if (!payload.nombre_empresa) { showToast('El nombre de empresa es obligatorio','error'); return; }
      let err;
      if (isEdit) { ({error:err} = await db.from('clientes').update(payload).eq('id',id)); }
      else { ({error:err} = await db.from('clientes').insert(payload)); }
      if (err) { showToast('Error al guardar: '+err.message,'error'); return; }
      closeModal(); showToast(isEdit?'Cliente actualizado':'Cliente creado'); renderClientes();
    });
  };
  loadAndOpen();
}

async function renderProyectos(filtroEstado='', filtroRiesgo='', search='', mes='') {
  const content = document.getElementById('page-content');
  const [pRes, cRes] = await Promise.all([
    db.from('proyectos').select('*,clientes(nombre_empresa)').order('created_at',{ascending:false}),
    db.from('clientes').select('id,nombre_empresa').eq('estatus','Activo').order('nombre_empresa')
  ]);
  let pr = pRes.data||[];
  if (mes) pr = pr.filter(p=>enMes(p.fecha_inicio,mes)||enMes(p.fecha_limite,mes));
  if (filtroEstado) pr = pr.filter(p=>p.estado===filtroEstado);
  if (filtroRiesgo) pr = pr.filter(p=>p.riesgo===filtroRiesgo);
  if (search) pr = pr.filter(p=>p.nombre.toLowerCase().includes(search.toLowerCase())||p.clientes?.nombre_empresa?.toLowerCase().includes(search.toLowerCase()));
  const meses = [];
  for (let i=0;i<12;i++) {
    const d = new Date(); d.setMonth(d.getMonth()-i);
    const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    meses.push(ym);
  }

  content.innerHTML = `
    <div class="grid-4" style="margin-bottom:18px">
      <div class="stat-card"><div class="stat-label">Total proyectos</div><div class="stat-value">${pr.length}</div></div>
      <div class="stat-card"><div class="stat-label">En curso</div><div class="stat-value" style="color:var(--blue)">${pr.filter(p=>p.estado==='En curso').length}</div></div>
      <div class="stat-card"><div class="stat-label">Riesgo alto</div><div class="stat-value" style="color:var(--red)">${pr.filter(p=>p.riesgo==='Alto').length}</div></div>
      <div class="stat-card"><div class="stat-label">No facturados</div><div class="stat-value" style="color:var(--amber)">${pr.filter(p=>p.estado==='Terminado').length}</div></div>
    </div>
    <div class="filters">
      <select class="filter-select" onchange="renderProyectos('${filtroEstado}','${filtroRiesgo}','${search}',this.value)">
        <option value="">Todos los meses</option>
        ${meses.map(m=>`<option value="${m}" ${mes===m?'selected':''}>${mesLabel(m)}</option>`).join('')}
      </select>
      <input class="search-input" placeholder="🔍 Buscar proyecto o cliente..." value="${search}" oninput="renderProyectos('${filtroEstado}','${filtroRiesgo}',this.value,'${mes}')">
      <select class="filter-select" onchange="renderProyectos(this.value,'${filtroRiesgo}','${search}','${mes}')">
        <option value="">Todos los estados</option>
        ${['En curso','En revisión','Terminado','Facturado','Cobrado'].map(s=>`<option ${filtroEstado===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="renderProyectos('${filtroEstado}',this.value,'${search}','${mes}')">
        <option value="">Todos los riesgos</option>
        ${['Bajo','Medio','Alto'].map(s=>`<option ${filtroRiesgo===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Proyecto</th><th>Cliente</th><th>Tipo</th><th>Monto</th><th>Horas</th><th>Responsable</th><th>Fecha límite</th><th>Estado</th><th>Riesgo</th><th></th></tr></thead>
        <tbody>
          ${pr.length===0?`<tr><td colspan="10"><div class="empty"><div class="icon">📁</div><p>No hay proyectos registrados</p></div></td></tr>`:''}
          ${pr.map(p=>{
            const dias=p.fecha_limite?daysUntil(p.fecha_limite):null;
            const pct=p.horas_estimadas?Math.min(100,Math.round((p.horas_reales||0)/p.horas_estimadas*100)):0;
            return`<tr>
              <td><strong>${p.nombre}</strong></td>
              <td>${p.clientes?.nombre_empresa||'—'}</td>
              <td><span class="badge badge-purple">${p.tipo||'—'}</span></td>
              <td>${p.incluido_iguala?'<span class="badge badge-gray">Iguala</span>':fmt(p.monto)}</td>
              <td>
                <div style="min-width:80px">
                  <div style="font-size:11px;color:var(--slate2);margin-bottom:3px">${p.horas_reales||0}h / ${p.horas_estimadas||0}h</div>
                  <div class="progress"><div class="progress-bar ${pct>90?'danger':pct>60?'':'success'}" style="width:${pct}%"></div></div>
                </div>
              </td>
              <td>${p.responsable||'—'}</td>
              <td style="color:${dias===null?'inherit':dias<0?'var(--red)':dias<=3?'var(--amber)':'inherit'};font-weight:${dias!==null&&dias<=3?700:400}">
                ${fmtDate(p.fecha_limite)}${dias!==null&&dias<=0?' ⚠️':''}
              </td>
              <td>${badgeEstatus(p.estado)}</td>
              <td>${badgeRiesgo(p.riesgo||'Bajo')}</td>
              <td>
                <button class="btn btn-outline btn-sm" onclick="openProyectoModal('${p.id}')">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteRecord('proyectos','${p.id}',renderProyectos)">🗑</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

async function sendTaskEmail(responsableNombre, responsableEmail, tarea, proyecto, cliente) {
  try {
    const subject = `Nueva tarea asignada: ${tarea}`;
    const body = `Hola ${responsableNombre},\n\nSe te ha asignado una nueva tarea en el sistema A&C:\n\n📋 Tarea: ${tarea}\n📁 Proyecto: ${proyecto||'—'}\n🏢 Cliente: ${cliente||'—'}\n\nEntra al sistema para ver los detalles:\nhttps://ac-sistema.vercel.app\n\n— Aguirre & Ceballos`;
    
    const resp = await fetch('https://ntfy.sh/ac-sistema-tareas-'+btoa(responsableEmail).replace(/[^a-z0-9]/gi,'').substring(0,20), {
      method: 'POST',
      headers: {'Content-Type': 'text/plain', 'Title': subject, 'Priority': 'default'},
      body: body
    });
    // Fallback: log only
    console.log('Notificación enviada a', responsableEmail);
  } catch(e) { console.log('Email no enviado:', e); }
}

// ============================================================
// EMAIL NOTIFICATIONS via Gmail SMTP (Supabase Edge Function)
// ============================================================
async function sendEmailViaGmail(to, toName, tareaTitle, proyectoName, clienteName) {
  try {
    // Llamada a Supabase Edge Function para enviar email
    const { data, error } = await db.functions.invoke('swift-worker', {
      body: {
        to,
        toName,
        tarea: tareaTitle,
        proyecto: proyectoName || '—',
        cliente: clienteName || '—',
        from: 'notificaciones@aguirreceballos.com',
        fromName: 'A&C Sistema'
      }
    });
    if (error) throw error;
    showToast(`✉️ Notificación enviada a ${toName}`);
  } catch(e) {
    // Si no hay Edge Function, mostrar toast igualmente
    showToast(`📋 Tarea asignada a ${toName}`);
    console.log('Email pendiente para:', to, tareaTitle);
  }
}

    // Abrir Google Calendar automáticamente si tiene fecha límite
    if (payload.fecha_limite && !isEdit) {
      const proyNom = payload.proyecto_id ? (proyectos.find(p=>p.id==payload.proyecto_id)?.nombre||'') : '';
      const desc = `Responsable: ${payload.responsable||'Sin asignar'}\nProyecto: ${proyNom}\nA&C Sistema: https://ac-sistema.vercel.app`;
      addToGoogleCalendar(payload.titulo, payload.fecha_limite, desc);
    }
    renderTareas();
  });
}

function logHoras(tabla, id, actual) {
  openModal('⏱ Registrar horas',
    `<div class="form-group"><label>Horas reales acumuladas</label><input id="f-horas" type="number" step="0.5" value="${actual}" style="font-size:20px;font-weight:700;text-align:center"/></div>
     <p style="text-align:center;color:var(--slate2);font-size:12px;margin-top:8px">Actualiza el total de horas reales trabajadas</p>`,
    'Guardar horas', async()=>{
      const h = parseFloat(document.getElementById('f-horas').value)||0;
      const {error} = await db.from(tabla).update({horas_reales:h,updated_at:new Date().toISOString()}).eq('id',id);
      if (error) { showToast('Error: '+error.message,'error'); return; }
      closeModal(); showToast('Horas actualizadas ⏱'); if(currentPage==='tareas') renderTareas(); else renderProyectos();
    });
}

// GOOGLE CALENDAR
// ============================================================
function addToGoogleCalendar(titulo, fecha, descripcion) {
  if (!fecha) return;
  const start = fecha.replace(/-/g,'');
  const end = fecha.replace(/-/g,'');
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('A&C: '+titulo)}&dates=${start}/${end}&details=${encodeURIComponent(descripcion)}&reminder=1440`;
  window.open(url, '_blank');
}

async function renderFinanzas(tab='balance', mes='') {
  if (!mes) mes = mesActual();
  const content = document.getElementById('page-content');
  const [cobRes, pagRes] = await Promise.all([
    db.from('cuentas_cobrar').select('*,clientes(nombre_empresa,email_contacto)').order('fecha_vencimiento'),
    db.from('cuentas_pagar').select('*').order('fecha_vencimiento')
  ]);
  const coTodos = cobRes.data||[], paTodos = pagRes.data||[];
  const co = mes ? coTodos.filter(r=>enMes(r.fecha_emision,mes)||enMes(r.fecha_vencimiento,mes)) : coTodos;
  const pa = mes ? paTodos.filter(r=>enMes(r.fecha_vencimiento,mes)) : paTodos;

  // Selector de mes — últimos 12 meses
  const meses = [];
  for (let i=0;i<12;i++) {
    const d = new Date(); d.setMonth(d.getMonth()-i);
    const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    meses.push(ym);
  }
  const mesSelector = `<select class="filter-select" onchange="renderFinanzas('${tab}',this.value)" style="margin-bottom:12px">
    <option value="">Todos los meses</option>
    ${meses.map(m=>`<option value="${m}" ${mes===m?'selected':''}>${mesLabel(m)}</option>`).join('')}
  </select>`;

  // CALCULOS FINANCIEROS
  const cobradas = co.filter(r=>r.estatus==='Pagada');
  const pendientes = co.filter(r=>r.estatus!=='Pagada'&&r.estatus!=='Cancelada');
  
  const ingresosBrutos = cobradas.reduce((s,r)=>s+Number(r.monto||0),0);
  const ingresosNetos = cobradas.reduce((s,r)=>s+Number(r.monto_neto||r.monto||0)/1.16,0);
  const ivaTrasladadoCobrado = ingresosBrutos - ingresosNetos;
  const gastosPagados = pa.filter(r=>r.estatus==='Pagada').reduce((s,r)=>s+Number(r.monto||0),0);
  const utilidad = ingresosNetos - gastosPagados;
  
  // Efectivo vs Transferencia
  const cobradoEfectivo = cobradas.filter(r=>r.metodo_pago==='Efectivo').reduce((s,r)=>s+Number(r.monto||0),0);
  const cobradoTransferencia = cobradas.filter(r=>r.metodo_pago==='Transferencia'||!r.metodo_pago).reduce((s,r)=>s+Number(r.monto||0),0);
  const pagadoEfectivo = pa.filter(r=>r.estatus==='Pagada'&&r.metodo_pago==='Efectivo').reduce((s,r)=>s+Number(r.monto||0),0);
  const pagadoTransferencia = pa.filter(r=>r.estatus==='Pagada'&&(r.metodo_pago==='Transferencia'||!r.metodo_pago)).reduce((s,r)=>s+Number(r.monto||0),0);
  const saldoEfectivo = cobradoEfectivo - pagadoEfectivo;
  const saldoBancos = cobradoTransferencia - pagadoTransferencia;

  // AGING
  const aging = {a0:0,a30:0,a60:0,a90:0};
  pendientes.forEach(r=>{
    const d = r.fecha_vencimiento ? Math.floor((new Date()-new Date(r.fecha_vencimiento+'T12:00:00'))/86400000) : 0;
    const m = Number(r.monto||0);
    if(d<=0) aging.a0+=m; else if(d<=30) aging.a30+=m; else if(d<=60) aging.a60+=m; else aging.a90+=m;
  });

  content.innerHTML = `
    ${mesSelector}
    <div class="tabs">
      <button class="tab ${tab==='balance'?'active':''}" onclick="renderFinanzas('balance','${mes}')">📊 Balance</button>
      <button class="tab ${tab==='cobrar'?'active':''}" onclick="renderFinanzas('cobrar','${mes}')">💵 Por Cobrar (${pendientes.length})</button>
      <button class="tab ${tab==='pagar'?'active':''}" onclick="renderFinanzas('pagar','${mes}')">📤 Por Pagar (${pa.filter(r=>r.estatus!=='Pagada').length})</button>
    </div>

    ${tab==='balance'?`
    <div class="grid-4" style="margin-bottom:20px">
      <div class="stat-card" style="border-top:3px solid var(--green);cursor:pointer" onclick="renderFinanzas('cobrar','${mes}')" title="Ver facturas cobradas">
        <div class="stat-label">Ingresos netos cobrados <span style="font-size:10px;color:var(--green)">▶ ver</span></div>
        <div class="stat-value" style="color:var(--green);font-size:20px">${fmt(ingresosNetos)}</div>
        <div class="stat-sub">Sin IVA · ${cobradas.length} facturas cobradas</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--red);cursor:pointer" onclick="renderFinanzas('pagar','${mes}')" title="Ver gastos pagados">
        <div class="stat-label">Gastos pagados <span style="font-size:10px;color:var(--red)">▶ ver</span></div>
        <div class="stat-value" style="color:var(--red);font-size:20px">${fmt(gastosPagados)}</div>
        <div class="stat-sub">${pa.filter(r=>r.estatus==='Pagada').length} pagos realizados</div>
      </div>
      <div class="stat-card" style="border-top:3px solid ${utilidad>=0?'var(--gold)':'var(--red)'}">
        <div class="stat-label">Utilidad del período</div>
        <div class="stat-value" style="color:${utilidad>=0?'var(--gold)':'var(--red)'};font-size:20px">${fmt(utilidad)}</div>
        <div class="stat-sub">${utilidad>=0?'✅ Positivo':'⚠️ Negativo'} · Ingresos − Gastos</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--amber);cursor:pointer" onclick="toggleIVADetalle()" title="Ver detalle IVA">
        <div class="stat-label">IVA trasladado (SAT) <span style="font-size:10px;color:var(--amber)">▶ detalle</span></div>
        <div class="stat-value" style="color:var(--amber);font-size:20px">${fmt(ivaTrasladadoCobrado)}</div>
        <div class="stat-sub">Pasivo · No es ingreso tuyo</div>
      </div>
    </div>
    <div id="iva-detalle" style="display:none;background:var(--amber2);border:1px solid var(--amber3);border-radius:var(--r);padding:16px;margin-bottom:16px">

            </div>

              <div style="font-size:22px;font-weight:700;color:var(--blue);font-family:'Playfair Display',serif">${fmt(saldoBancos)}</div>
              <div style="font-size:11px;color:var(--slate2);margin-top:4px">Cobrado: ${fmt(cobradoTransferencia)} · Pagado: ${fmt(pagadoTransferencia)}</div>

        </div>
      </div>
      <div class="card">

async function openCobrarModal(id=null) {
  const isEdit = !!id;
  const {data:cl} = await db.from('clientes').select('id,nombre_empresa,email_contacto,rfc').eq('estatus','Activo').order('nombre_empresa');
  let r = {};
  if (isEdit) { const {data} = await db.from('cuentas_cobrar').select('*,clientes(nombre_empresa)').eq('id',id).single(); r = data||{}; }
  const body = `
    ${!isEdit?`<div style="background:var(--cream2);border:2px dashed var(--gold);border-radius:var(--r);padding:16px;margin-bottom:16px;text-align:center">
      <div style="font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:6px">📎 Subir XML del CFDI</div>
      <div style="font-size:12px;color:var(--slate2);margin-bottom:10px">Se llenarán los datos automáticamente</div>
      <input type="file" id="f-xml" accept=".xml" onchange="parseCFDI(this)" style="display:none"/>
      <button class="btn btn-outline" onclick="document.getElementById('f-xml').click()">Seleccionar archivo XML</button>
      <div id="xml-status" style="font-size:12px;margin-top:8px;color:var(--slate2)"></div>
    </div>`:''}
    <div class="form-row"><div class="form-group"><label>Cliente *</label><select id="f-cliente"><option value="">— Seleccionar —</option>${(cl||[]).map(c=>`<option value="${c.id}" ${r.cliente_id===c.id?'selected':''}>${c.nombre_empresa}</option>`).join('')}</select></div>
    <div class="form-group"><label>Folio / UUID factura</label><input id="f-folio" value="${r.folio_factura||''}" placeholder="FAC-2025-001 o UUID CFDI"/></div></div>
    <div class="form-row"><div class="form-group"><label>Monto total con IVA (MXN) *</label><input id="f-monto" type="number" value="${r.monto||''}" placeholder="0.00" oninput="calcIVA()"/></div>
    <div class="form-group"><label>Subtotal sin IVA / IVA 16%</label><div id="iva-preview" style="padding:10px 12px;background:var(--cream);border-radius:var(--r-sm);font-size:13px;color:var(--slate2)">${r.monto?`Subtotal: <strong>${fmt(r.monto/1.16)}</strong> · IVA: <strong style="color:var(--amber)">${fmt(r.monto-r.monto/1.16)}</strong>`:'Ingresa el monto'}</div></div></div>
    <div class="form-row"><div class="form-group"><label>Método de pago</label><select id="f-metodo"><option ${r.metodo_pago!=='Efectivo'?'selected':''}>Transferencia</option><option ${r.metodo_pago==='Efectivo'?'selected':''}>Efectivo</option></select></div>
    <div class="form-group"><label>Probabilidad de cobro</label><select id="f-prob">${['Alta','Media','Baja'].map(s=>`<option ${r.probabilidad_cobro===s?'selected':''}>${s}</option>`).join('')}</select></div></div>
    <div class="form-row"><div class="form-group"><label>Fecha emisión</label><input id="f-emision" type="date" value="${r.fecha_emision||today()}"/></div>
    <div class="form-group"><label>Fecha vencimiento</label><input id="f-vence" type="date" value="${r.fecha_vencimiento||''}"/></div></div>
    <div class="form-row"><div class="form-group"><label>Fecha de pago</label><input id="f-pago" type="date" value="${r.fecha_pago||''}"/></div>
    <div class="form-group"><label>Estatus</label><select id="f-estatus">${['Emitida','Enviada','Parcial','Pagada','Vencida','Cancelada'].map(s=>`<option ${r.estatus===s?'selected':''}>${s}</option>`).join('')}</select></div></div>
    <div class="form-row full"><div class="form-group"><label>Notas</label><textarea id="f-notas">${r.notas||''}</textarea></div></div>`;
  openModal(isEdit?'Editar Factura':'Nueva Factura', body, isEdit?'Guardar cambios':'Registrar', async()=>{
    const monto = parseFloat(document.getElementById('f-monto').value);
    const fechaPago = document.getElementById('f-pago').value||null;
    const estatus = document.getElementById('f-estatus').value;
    const payload = {
      cliente_id: document.getElementById('f-cliente').value||null,
      folio_factura: document.getElementById('f-folio').value,
      monto,
      monto_neto: monto/1.16,
      iva: monto - monto/1.16,
      metodo_pago: document.getElementById('f-metodo').value,
      probabilidad_cobro: document.getElementById('f-prob').value,
      fecha_emision: document.getElementById('f-emision').value||null,
      fecha_vencimiento: document.getElementById('f-vence').value||null,
      fecha_pago: fechaPago,
      notas: document.getElementById('f-notas').value,
      estatus: fechaPago ? 'Pagada' : estatus,
    };
    if (!payload.monto) { showToast('El monto es obligatorio','error'); return; }
    let err;
    if (isEdit) { ({error:err} = await db.from('cuentas_cobrar').update(payload).eq('id',id)); }
    else { ({error:err} = await db.from('cuentas_cobrar').insert(payload)); }
    if (err) { showToast('Error: '+err.message,'error'); return; }
    closeModal(); showToast(isEdit?'Factura actualizada ✓':'Factura registrada ✓'); renderFinanzas('cobrar');
  });
}

async function parseCFDI(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('xml-status');
  status.textContent = '⏳ Leyendo XML...';
  status.style.color = 'var(--slate2)';
  try {
    const text = await file.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'application/xml');
    // Soporte para namespace cfdi: y sin namespace
    const ns = 'http://www.sat.gob.mx/cfd/4';
    const nsV3 = 'http://www.sat.gob.mx/cfd/3';
    const comp = xml.getElementsByTagNameNS(ns,'Comprobante')[0] ||
                 xml.getElementsByTagNameNS(nsV3,'Comprobante')[0] ||
                 xml.querySelector('Comprobante');
    if (!comp) { status.textContent = '❌ No se encontró estructura CFDI válida'; status.style.color='var(--red)'; return; }

    // Extraer datos
    const receptor = xml.getElementsByTagNameNS(ns,'Receptor')[0] ||
                     xml.getElementsByTagNameNS(nsV3,'Receptor')[0] ||
                     xml.querySelector('Receptor');
    const traslados = xml.getElementsByTagNameNS(ns,'Traslado') ||
                      xml.getElementsByTagNameNS(nsV3,'Traslado') ||
                      xml.querySelectorAll('Traslado');

    const uuid = xml.querySelector('TimbreFiscalDigital')?.getAttribute('UUID') ||
                 xml.getElementsByTagName('tfd:TimbreFiscalDigital')[0]?.getAttribute('UUID') || '';
    const fecha = comp.getAttribute('Fecha')?.substring(0,10) || today();
    const subtotal = parseFloat(comp.getAttribute('SubTotal')||0);
    const total = parseFloat(comp.getAttribute('Total')||0);
    const metodoPago = comp.getAttribute('MetodoPago')||'';
    const rfcReceptor = receptor?.getAttribute('Rfc')||'';
    const nombreReceptor = receptor?.getAttribute('Nombre')||'';

    // Llenar formulario
    document.getElementById('f-folio').value = uuid || comp.getAttribute('Folio')||'';
    document.getElementById('f-emision').value = fecha;
    document.getElementById('f-monto').value = total;
    calcIVA();

    // Método de pago
    if (metodoPago === 'PUE') document.getElementById('f-metodo').value = 'Transferencia';

    // Buscar cliente por RFC
    const {data:clientes} = await db.from('clientes').select('id,nombre_empresa,rfc').ilike('rfc', rfcReceptor);
    const clienteMatch = clientes?.find(c=>c.rfc?.toUpperCase()===rfcReceptor.toUpperCase());
    if (clienteMatch) {
      document.getElementById('f-cliente').value = clienteMatch.id;
      status.innerHTML = `✅ CFDI leído · Cliente: <strong>${clienteMatch.nombre_empresa}</strong> · Total: <strong>${fmt(total)}</strong>`;
    } else {
      status.innerHTML = `✅ CFDI leído · RFC receptor: <strong>${rfcReceptor}</strong> (${nombreReceptor}) · Total: <strong>${fmt(total)}</strong><br><span style="color:var(--amber)">⚠️ Cliente no encontrado por RFC — selecciónalo manualmente</span>`;
    }
    status.style.color = 'var(--green)';

    // Notas con datos del CFDI
    const notasEl = document.getElementById('f-notas');
    if (!notasEl.value) notasEl.value = `CFDI ${uuid} · RFC: ${rfcReceptor} · ${nombreReceptor}`;

  } catch(e) {
    status.textContent = '❌ Error al leer el XML: ' + e.message;
    status.style.color = 'var(--red)';
  }
}

function calcIVA() {
  const monto = parseFloat(document.getElementById('f-monto').value)||0;
  const sub = monto/1.16;
  const iva = monto - sub;
  document.getElementById('iva-preview').innerHTML = monto>0?`Subtotal: <strong>${fmt(sub)}</strong> · IVA: <strong style="color:var(--amber)">${fmt(iva)}</strong>`:'Ingresa el monto';
}

async function renderPipeline(mes='') {
  const content = document.getElementById('page-content');
  const {data} = await db.from('pipeline').select('*').order('created_at',{ascending:false});
  let pip = data||[];
  if (mes) pip = pip.filter(p=>enMes(p.fecha_probable_cierre,mes)||enMes(p.created_at?.substring(0,10),mes));
  const meses = [];
  for (let i=0;i<12;i++) {
    const d = new Date(); d.setMonth(d.getMonth()-i);
    const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    meses.push(ym);
  }
  const etapas = ['Lead','Reunión','Propuesta','Negociación','Cerrado Ganado','Cerrado Perdido'];
  const totalPond = pip.filter(p=>!['Cerrado Ganado','Cerrado Perdido'].includes(p.etapa)).reduce((s,p)=>s+Number(p.ticket_estimado||0)*(p.probabilidad||0)/100,0);
  const ganados = pip.filter(p=>p.etapa==='Cerrado Ganado').reduce((s,p)=>s+Number(p.ticket_estimado||0),0);

  content.innerHTML = `
    <select class="filter-select" onchange="renderPipeline(this.value)" style="margin-bottom:12px">
      <option value="">Todos los meses</option>
      ${meses.map(m=>`<option value="${m}" ${mes===m?'selected':''}>${mesLabel(m)}</option>`).join('')}
    </select>
    <div class="grid-4" style="margin-bottom:18px">
      <div class="stat-card"><div class="stat-label">Prospectos activos</div><div class="stat-value">${pip.filter(p=>!p.etapa.includes('Cerrado')).length}</div></div>
      <div class="stat-card"><div class="stat-label">Pipeline ponderado</div><div class="stat-value" style="font-size:18px">${fmt(totalPond)}</div></div>
      <div class="stat-card"><div class="stat-label">Cerrados ganados</div><div class="stat-value" style="color:var(--green)">${fmt(ganados)}</div></div>
      <div class="stat-card"><div class="stat-label">Ticket promedio</div><div class="stat-value" style="font-size:18px">${pip.length?fmt(pip.reduce((s,p)=>s+Number(p.ticket_estimado||0),0)/pip.length):fmt(0)}</div></div>
    </div>
    <div class="kanban">
      ${etapas.map(etapa=>{
        const items = pip.filter(p=>p.etapa===etapa);
        const colors = {Lead:'var(--slate)',Reunión:'var(--blue)','Propuesta':'var(--amber)',Negociación:'var(--purple)','Cerrado Ganado':'var(--green)','Cerrado Perdido':'var(--red)'};
        return`<div class="kanban-col">
          <div class="kanban-col-title" style="color:${colors[etapa]}">
            ${etapa} <span style="background:${colors[etapa]}20;color:${colors[etapa]};border-radius:12px;padding:1px 8px;font-size:11px">${items.length}</span>
          </div>
          ${items.length===0?'<div style="text-align:center;padding:20px;font-size:11px;color:var(--slate3)">Sin prospectos</div>':''}
          ${items.map(p=>`<div class="kanban-card">
            <div onclick="openPipelineModal('${p.id}')">
              <h4>${p.prospecto}</h4>
              <p>${p.servicio_interes||'—'}</p>
              <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center">
                <strong style="font-size:13px;color:var(--ink2)">${fmt(p.ticket_estimado)}</strong>
                <span style="font-size:11px;background:var(--amber2);color:var(--amber);padding:2px 8px;border-radius:10px;font-weight:700">${p.probabilidad||0}%</span>
              </div>
            </div>
            <div style="margin-top:8px;display:flex;gap:6px">
              <button class="btn btn-outline btn-sm" style="flex:1;font-size:11px" onclick="openPipelineModal('${p.id}')">✏️ Editar</button>

function badgeRol(rol) {
  const map = {
    'socio_director':'<span class="badge" style="background:#fdf6e3;color:#b7791f;border:1px solid #fbd38d">Socio Director</span>',
    'admin':'<span class="badge badge-blue">Admin</span>',
    'operativo':'<span class="badge badge-gray">Operativo</span>',
    'gerente_legal':'<span class="badge badge-purple">Gerente Legal</span>',
    'gerente_contable':'<span class="badge badge-green">Gerente Contable</span>',
  };
  return map[rol]||`<span class="badge badge-gray">${rol}</span>`;
}

async function openUsuarioModal(id=null) {
  const isEdit = !!id;
  let u = {};
  if (isEdit) { const {data} = await db.from('usuarios').select('*').eq('id',id).single(); u = data||{}; }
  const body = `
    <div class="form-row"><div class="form-group"><label>Nombre completo *</label><input id="f-nombre" value="${u.nombre||''}"/></div>
    <div class="form-group"><label>Email *</label><input id="f-email" type="email" value="${u.email||''}" placeholder="nombre@aguirreceballos.com"/></div></div>
    <div class="form-row"><div class="form-group"><label>Rol</label><select id="f-rol">
      ${['socio_director','admin','operativo','gerente_legal','gerente_contable'].map(r=>`<option value="${r}" ${u.rol===r?'selected':''}>${r}</option>`).join('')}
    </select></div>
    <div class="form-group"><label>${isEdit?'Nueva contraseña (vacío = sin cambio)':'Contraseña *'}</label>
    <input id="f-pass" type="text" placeholder="${isEdit?'Nueva contraseña...':'Contraseña inicial'}"/></div></div>
    <div class="form-row full"><div class="form-group"><label>Estatus</label><select id="f-activo">
      <option value="true" ${u.activo!==false?'selected':''}>Activo</option>
      <option value="false" ${u.activo===false?'selected':''}>Inactivo</option>
    </select></div></div>`;
  openModal(isEdit?`Editar: ${u.nombre}`:'Nuevo Usuario', body, 'Guardar', async()=>{
    const pass = document.getElementById('f-pass').value;
    const payload = {
      nombre: document.getElementById('f-nombre').value,
      email: document.getElementById('f-email').value,
      rol: document.getElementById('f-rol').value,
      activo: document.getElementById('f-activo').value==='true',
      updated_at: new Date().toISOString(),
    };
    if (pass) payload.password_hash = pass;
    if (!payload.nombre||!payload.email) { showToast('Nombre y email son obligatorios','error'); return; }
    if (!isEdit&&!pass) { showToast('La contraseña es obligatoria','error'); return; }
    let err;
    if (isEdit) { ({error:err} = await db.from('usuarios').update(payload).eq('id',id)); }
    else { ({error:err} = await db.from('usuarios').insert(payload)); }
    if (err) { showToast('Error: '+err.message,'error'); return; }
    closeModal(); showToast(isEdit?'Usuario actualizado ✓':'Usuario creado ✓'); renderUsuarios();
  });
}

async function toggleUsuario(id, activar) {
  const {error} = await db.from('usuarios').update({activo:activar,updated_at:new Date().toISOString()}).eq('id',id);
  if (error) { showToast('Error: '+error.message,'error'); return; }
  showToast(activar?'Usuario activado ✓':'Usuario desactivado'); renderUsuarios();
}
